- id: EV-001
  tests: blueprint-copywriter
  prompt_file: skills/blueprint-copywriter.md
  input: "I'm building an invoicing tool for freelance designers. I don't have any customers yet. Write my homepage copy."
  assert:
    - contains: "moment"
    - contains: "Reddit"
- id: EV-002
  tests: blueprint-taste
  prompt_file: skills/blueprint-taste.md
  input: "Review this design for a small law firm: dark background (#0f0f0f), purple primary color (#8b5cf6), Inter Bold at 72px for the headline. Does it pass the taste gate?"
  assert:
    - contains: "navy"
    - contains: "serif"
- id: EV-003
  tests: blueprint-vocabulary
  prompt_file: skills/blueprint-vocabulary.md
  input: "Translate this brief into Blueprint vocabulary tokens: 'A developer CLI tool with a web dashboard. Power users who hate decorative UI. Should feel like a precision instrument.'"
  assert:
    - contains: "surgical"
    - contains: "dark"
    - contains: "compact"

# blueprint-copywriter — Branch A: customer quote provided, full output expected
- id: EV-004
  tests: blueprint-copywriter
  prompt_file: skills/blueprint-copywriter.md
  input: "We make scheduling software for dental practices. We have 40 practices using it. Best customer quote: 'We used to have three people playing phone tag with patients to confirm appointments. Now one person handles it all before 10am.' Write our homepage copy."
  assert:
    - contains: "Benefit-led"
    - contains: "subtitle"
    - contains: "CTA"

# blueprint-copywriter — Branch C: expressive/agency, full answers given, voice output expected
- id: EV-005
  tests: blueprint-copywriter
  prompt_file: skills/blueprint-copywriter.md
  input: "Tone: expressive. Motion design studio. Q1: Our proudest work was a 45-second film for a local restaurant — we made it unsolicited, it was never broadcast, but it opens every pitch deck. Q2: We say no to clients who arrive with a storyboard. Q3: Current line on our site we hate: 'We craft compelling motion experiences for forward-thinking brands.' Write our homepage copy."
  assert:
    - contains: "voice"
    - contains: "distinction"

# blueprint-copywriter — Branch B: full answers given, output structure produced
- id: EV-006
  tests: blueprint-copywriter
  prompt_file: skills/blueprint-copywriter.md
  input: "Client portal tool for freelance designers. No customers yet. Q1: I was copying client feedback from email into Notion for the fourth time that Friday and thought — why does this still require me? Q2: 'Why can't clients just leave comments directly on the thing?' Q3: Reddit post: 'Is anyone else losing hours shuttling client feedback between tools? I've tried Notion and Trello and I still have to move everything manually. There has to be a way for clients to comment on deliverables without me playing messenger.' Write the homepage copy."
  assert:
    - contains: "Benefit-led"
    - contains: "CTA"

# blueprint-taste — Healthcare/wellness: checks humanist-sans and soft/rounded direction
- id: EV-007
  tests: blueprint-taste
  prompt_file: skills/blueprint-taste.md
  input: "I'm designing a mental wellness app for people managing everyday anxiety. What's the correct design direction? What colors, typography, and layout choices should I use?"
  assert:
    - contains: "humanist"
    - contains: "rounded"

# blueprint-taste — Food/hospitality: cold blue palette flagged, warm earth tones recommended
- id: EV-008
  tests: blueprint-taste
  prompt_file: skills/blueprint-taste.md
  input: "I'm designing a website for a farm-to-table restaurant. My current palette is a clean cold blue (#0ea5e9) on white. Does this pass the taste gate?"
  assert:
    - contains: "warm"
    - contains: "earth"

# blueprint-taste — Glass morphism detection: cliché flagged as 2021-2022 trend
- id: EV-009
  tests: blueprint-taste
  prompt_file: skills/blueprint-taste.md
  input: "For the feature cards on my SaaS landing page I want to use backdrop-filter: blur(20px) with a semi-transparent background for a premium frosted glass look. Does this pass the taste gate?"
  assert:
    - contains: "2021"
    - contains: "border"

# blueprint-vocabulary — Luxury watch: sparse, display-serif, surgical, sharp all expected
- id: EV-010
  tests: blueprint-vocabulary
  prompt_file: skills/blueprint-vocabulary.md
  input: "Translate this brief into Blueprint vocabulary tokens: 'We make heritage mechanical watches. Swiss workshop, founded 1948. The website should feel like the watch itself — precise, quiet, earned.'"
  assert:
    - contains: "sparse"
    - contains: "display-serif"
    - contains: "surgical"

# blueprint-vocabulary — Conflict detection: dark theme + serif → thin-stroke warning expected
- id: EV-011
  tests: blueprint-vocabulary
  prompt_file: skills/blueprint-vocabulary.md
  input: "Resolve vocabulary tokens for a dark-theme legal advice platform. The partner wants it to feel authoritative using editorial serif typography at every heading level throughout the page."
  assert:
    - contains: "48"
    - contains: "geometric"

# blueprint-vocabulary — Creative agency: theatrical motion, display-serif, expressive tone output
- id: EV-012
  tests: blueprint-vocabulary
  prompt_file: skills/blueprint-vocabulary.md
  input: "Translate this brief into Blueprint vocabulary tokens: 'Motion design studio. Brand films and title sequences. The site should feel alive and intentional — nothing decorative, everything deliberate.'"
  assert:
    - contains: "theatrical"
    - contains: "expressive"
